server:
  port: 4000
  host: 0.0.0.0

# minimal: one line per request
# standard: + system/user message preview (default)
# verbose: + all messages + tool names
logging:
  level: verbose

backends:
  anthropic:
    url: https://api.anthropic.com
    # apiKey from ANTHROPIC_API_KEY env var

  ollama:
    # Use host.docker.internal when running in Docker, localhost for native
    url: http://host.docker.internal:11434

routing:
  rules:
    - match: "claude-*"
      backend: anthropic
    - match: "qwen*"
      backend: ollama
    - match: "llama*"
      backend: ollama
    - match: "*"
      backend: ollama
