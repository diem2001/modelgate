server:
  port: 4000
  host: 0.0.0.0

# Validate incoming tokens against Anthropic API (cached)
auth:
  enabled: true
  cacheTtlMinutes: 60

# minimal: one line per request
# standard: + system/user message preview (default)
# verbose: + all messages + tool names
logging:
  level: verbose

backends:
  anthropic:
    url: https://api.anthropic.com
    # Auth is passed through from the client's original token

  lmstudio:
    # LM Studio local API (via SSH tunnel from Mac)
    # apiMode: openai (default) = /v1/chat/completions
    # apiMode: anthropic = /v1/messages (supports tool use)
    # Override via LMSTUDIO_API_MODE env var
    url: http://host.docker.internal:11234

routing:
  rules:
    - match: "claude-haiku-*"
      backend: lmstudio
      model: qwen2.5-coder-32b
    - match: "claude-*"
      backend: anthropic
    - match: "qwen*"
      backend: lmstudio
    - match: "llama*"
      backend: lmstudio
    - match: "*"
      backend: lmstudio
