<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelGate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #080b12;
      --bg-surface: #0d1117;
      --bg-card: #131820;
      --bg-card-hover: #181f2a;
      --bg-elevated: #1c2333;
      --border: #1e2736;
      --border-subtle: #161d29;
      --border-focus: #2d9cdb;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent-cyan: #2d9cdb;
      --accent-cyan-dim: rgba(45, 156, 219, 0.12);
      --accent-cyan-glow: rgba(45, 156, 219, 0.25);
      --accent-amber: #d4a053;
      --accent-amber-dim: rgba(212, 160, 83, 0.12);
      --accent-green: #3fb950;
      --accent-green-dim: rgba(63, 185, 80, 0.12);
      --accent-red: #f85149;
      --accent-red-dim: rgba(248, 81, 73, 0.10);
      --accent-purple: #a78bfa;
      --accent-purple-dim: rgba(167, 139, 250, 0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Dot grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--border-subtle) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
      animation: fadeDown 0.5s ease-out;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-cyan), #1a6fa3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 20px;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 20px var(--accent-cyan-glow);
    }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease-out both;
    }
    .section:nth-child(2) { animation-delay: 0.08s; }
    .section:nth-child(3) { animation-delay: 0.16s; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 12px var(--accent-cyan-dim);
    }

    .btn-primary {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      color: #fff;
    }
    .btn-primary:hover {
      background: #3aade8;
      border-color: #3aade8;
      color: #fff;
      box-shadow: 0 0 20px var(--accent-cyan-glow);
    }

    .btn-sm {
      padding: 4px 8px;
      font-size: 11px;
    }

    .btn-icon {
      width: 30px;
      height: 30px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-icon:hover {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-icon.danger:hover {
      background: var(--accent-red-dim);
      color: var(--accent-red);
      border-color: rgba(248, 81, 73, 0.2);
    }

    /* ── Backend Cards ── */
    .backends-grid {
      display: grid;
      gap: 12px;
    }

    .backend-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all var(--transition);
      cursor: default;
    }
    .backend-card:hover {
      border-color: var(--border-focus);
      background: var(--bg-card-hover);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .backend-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      flex-shrink: 0;
    }
    .backend-icon.anthropic { background: linear-gradient(135deg, #d4763a, #c25e28); }
    .backend-icon.lmstudio { background: linear-gradient(135deg, #2d9cdb, #1a6fa3); }
    .backend-icon.openrouter { background: linear-gradient(135deg, #3fb950, #238636); }
    .backend-icon.default { background: linear-gradient(135deg, #6e7681, #484f58); }

    .backend-info { flex: 1; min-width: 0; }

    .backend-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .backend-url {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .backend-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .tag-mode-anthropic { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .tag-mode-openai { background: var(--accent-purple-dim); color: var(--accent-purple); }
    .tag-optimized { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
    .tag-key { background: var(--accent-green-dim); color: var(--accent-green); }
    .tag-nokey { background: rgba(139, 148, 158, 0.08); color: var(--text-muted); }

    .backend-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    /* ── Routing Table ── */
    .routing-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .routing-header {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 1fr 80px;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    .routing-header span {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }

    .routing-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 1fr 80px;
      gap: 8px;
      padding: 6px 16px;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition);
    }
    .routing-row:last-child { border-bottom: none; }
    .routing-row:hover { background: var(--bg-card-hover); }

    .routing-row .row-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .routing-row input,
    .routing-row select {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      outline: none;
      transition: all var(--transition);
      width: 100%;
    }
    .routing-row input:hover,
    .routing-row select:hover {
      background: var(--bg-elevated);
      border-color: var(--border);
    }
    .routing-row input:focus,
    .routing-row select:focus {
      background: var(--bg-elevated);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px var(--accent-cyan-dim);
    }

    .routing-row select option {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .row-actions {
      display: flex;
      gap: 2px;
      justify-content: center;
    }

    .routing-footer {
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px;
      gap: 8px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 480px;
      padding: 28px;
      animation: scaleIn 0.2s ease-out;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .modal h3 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      outline: none;
      transition: all var(--transition);
    }
    .form-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px var(--accent-cyan-dim);
    }
    .form-input::placeholder { color: var(--text-muted); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
      padding-top: 26px;
    }

    .form-checkbox input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-deep);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .form-checkbox input[type="checkbox"]:checked {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
    }
    .form-checkbox input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #fff;
      font-weight: 600;
    }

    .form-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: var(--mono);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .modal-actions .btn { flex: 1; justify-content: center; padding: 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.success { border-color: rgba(63, 185, 80, 0.3); }
    .toast.success::before { content: '●'; color: var(--accent-green); font-size: 8px; }
    .toast.error { border-color: rgba(248, 81, 73, 0.3); }
    .toast.error::before { content: '●'; color: var(--accent-red); font-size: 8px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── SVG Icons ── */
    .icon { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-logo">M</div>
      <div class="header-text">
        <h1>ModelGate</h1>
        <p>LLM Proxy Admin</p>
      </div>
      <div class="header-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">connected</span>
      </div>
    </div>

    <!-- Backends -->
    <section class="section">
      <div class="section-header">
        <span class="section-title">Backends</span>
        <button class="btn" onclick="showAddBackend()">
          <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div id="backends-list" class="backends-grid"></div>
    </section>

    <!-- Routing Rules -->
    <section class="section">
      <div class="section-header">
        <span class="section-title">Routing Rules</span>
        <button class="btn" onclick="addRule()">
          <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Rule
        </button>
      </div>
      <div class="routing-table">
        <div class="routing-header">
          <span>#</span>
          <span>Pattern</span>
          <span>Backend</span>
          <span>Model Override</span>
          <span style="text-align:center">Actions</span>
        </div>
        <div id="rules-list"></div>
        <div class="routing-footer">
          <button class="btn btn-primary" onclick="saveRules()">Save Rules</button>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="modal-title">Add Backend</h3>
      <form id="backend-form" onsubmit="saveBackend(event)">
        <div class="form-group">
          <label>Name</label>
          <input id="be-name" type="text" required class="form-input" placeholder="my-backend">
        </div>
        <div class="form-group">
          <label>URL</label>
          <input id="be-url" type="text" required class="form-input" placeholder="https://api.example.com">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input id="be-key" type="text" class="form-input" placeholder="sk-...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>API Mode</label>
            <select id="be-mode" class="form-input">
              <option value="">OpenAI Compatible</option>
              <option value="anthropic">Anthropic Native</option>
            </select>
            <div class="form-hint" id="be-mode-hint"></div>
          </div>
          <label class="form-checkbox">
            <input id="be-optimize" type="checkbox">
            Optimize
          </label>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

<script>
const API = '/admin/api';
let backends = {};
let rules = [];
let backendNames = [];

async function load() {
  try {
    const [bRes, rRes] = await Promise.all([
      fetch(`${API}/backends`).then(r => r.json()),
      fetch(`${API}/routing`).then(r => r.json()),
    ]);
    backends = bRes;
    rules = rRes;
    backendNames = Object.keys(backends);
    renderBackends();
    renderRules();
    document.getElementById('status-text').textContent = 'connected';
    document.getElementById('status-dot').style.background = 'var(--accent-green)';
  } catch (e) {
    document.getElementById('status-text').textContent = 'disconnected';
    document.getElementById('status-dot').style.background = 'var(--accent-red)';
    toast('Failed to load config', 'error');
  }
}

function resolveApiMode(name, b) {
  // The "anthropic" backend always uses native Anthropic API regardless of apiMode field
  if (name === 'anthropic') return 'anthropic';
  return b.apiMode || 'openai';
}

function renderBackends() {
  const el = document.getElementById('backends-list');
  el.innerHTML = Object.entries(backends).map(([name, b]) => {
    const iconClass = ['anthropic','lmstudio','openrouter'].includes(name) ? name : 'default';
    const initial = name[0].toUpperCase();
    const mode = resolveApiMode(name, b);
    const modeTag = mode === 'anthropic'
      ? '<span class="tag tag-mode-anthropic">anthropic</span>'
      : '<span class="tag tag-mode-openai">openai</span>';
    const optimizeTag = b.optimize ? '<span class="tag tag-optimized">optimized</span>' : '';
    const keyTag = b.apiKey
      ? '<span class="tag tag-key">key set</span>'
      : '<span class="tag tag-nokey">no key</span>';
    const deleteBtn = name !== 'anthropic'
      ? `<button class="btn-icon danger" onclick="removeBackend('${name}')" title="Delete">
           <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
         </button>`
      : '';
    return `
      <div class="backend-card">
        <div class="backend-icon ${iconClass}">${initial}</div>
        <div class="backend-info">
          <div class="backend-name">${name}</div>
          <div class="backend-url">${b.url}</div>
        </div>
        <div class="backend-tags">
          ${modeTag}${optimizeTag}${keyTag}
        </div>
        <div class="backend-actions">
          <button class="btn-icon" onclick="editBackend('${name}')" title="Edit">
            <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

function renderRules() {
  const el = document.getElementById('rules-list');
  el.innerHTML = rules.map((r, i) => `
    <div class="routing-row" data-idx="${i}">
      <span class="row-num">${i + 1}</span>
      <input value="${r.match}" onchange="rules[${i}].match=this.value" placeholder="*">
      <select onchange="rules[${i}].backend=this.value">
        ${backendNames.map(n => `<option value="${n}" ${n===r.backend?'selected':''}>${n}</option>`).join('')}
      </select>
      <input value="${r.model||''}" onchange="rules[${i}].model=this.value||undefined" placeholder="(none)">
      <div class="row-actions">
        <button class="btn-icon" onclick="moveRule(${i},-1)" ${i===0?'disabled style="opacity:0.25"':''} title="Move up">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="btn-icon" onclick="moveRule(${i},1)" ${i===rules.length-1?'disabled style="opacity:0.25"':''} title="Move down">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="btn-icon danger" onclick="removeRule(${i})" title="Remove">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function addRule() {
  rules.push({ match: '*', backend: backendNames[0] || 'anthropic' });
  renderRules();
}

function removeRule(i) {
  rules.splice(i, 1);
  renderRules();
}

function moveRule(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= rules.length) return;
  [rules[i], rules[j]] = [rules[j], rules[i]];
  renderRules();
}

async function saveRules() {
  const cleaned = rules.map(r => {
    const rule = { match: r.match, backend: r.backend };
    if (r.model) rule.model = r.model;
    return rule;
  });
  const res = await fetch(`${API}/routing`, {
    method: 'PUT',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(cleaned),
  });
  if (res.ok) toast('Routing rules saved');
  else toast('Failed to save rules', 'error');
}

// ── Backend modal ──

let editingBackend = null;

function showAddBackend() {
  editingBackend = null;
  document.getElementById('modal-title').textContent = 'Add Backend';
  document.getElementById('be-name').value = '';
  document.getElementById('be-name').disabled = false;
  document.getElementById('be-url').value = '';
  document.getElementById('be-key').value = '';
  document.getElementById('be-mode').value = '';
  document.getElementById('be-optimize').checked = false;
  document.getElementById('be-mode-hint').textContent = '';
  openModal();
}

function editBackend(name) {
  editingBackend = name;
  const b = backends[name];
  document.getElementById('modal-title').textContent = `Edit: ${name}`;
  document.getElementById('be-name').value = name;
  document.getElementById('be-name').disabled = true;
  document.getElementById('be-url').value = b.url;
  document.getElementById('be-key').value = b.apiKey || '';
  document.getElementById('be-mode').value = b.apiMode || '';
  document.getElementById('be-optimize').checked = !!b.optimize;

  // For the "anthropic" backend, show a hint that it always uses native Anthropic API
  if (name === 'anthropic') {
    document.getElementById('be-mode-hint').textContent = 'Always uses native Anthropic API';
  } else {
    document.getElementById('be-mode-hint').textContent = '';
  }

  openModal();
}

async function saveBackend(e) {
  e.preventDefault();
  const name = editingBackend || document.getElementById('be-name').value.trim();
  if (!name) return;

  const body = {
    url: document.getElementById('be-url').value.trim(),
    apiKey: document.getElementById('be-key').value.trim() || undefined,
    apiMode: document.getElementById('be-mode').value || undefined,
    optimize: document.getElementById('be-optimize').checked,
  };

  const res = await fetch(`${API}/backends/${name}`, {
    method: 'PUT',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (res.ok) {
    closeModal();
    toast(`Backend "${name}" saved`);
    load();
  } else {
    const err = await res.json();
    toast(err.error || 'Failed to save', 'error');
  }
}

async function removeBackend(name) {
  if (!confirm(`Delete backend "${name}"?`)) return;
  const res = await fetch(`${API}/backends/${name}`, { method: 'DELETE' });
  if (res.ok) {
    toast(`Backend "${name}" deleted`);
    load();
  }
}

// ── Modal helpers ──

function openModal() {
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// Close on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── Toast ──

let toastTimer;
function toast(msg, type = 'success') {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} visible`;
  toastTimer = setTimeout(() => { el.classList.remove('visible'); }, 2800);
}

// ── Init ──
load();
</script>
</body>
</html>
