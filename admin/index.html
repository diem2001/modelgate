<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelGate Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwindcss.config={darkMode:'class',theme:{extend:{colors:{bg:'#0f1117',card:'#1a1d27',border:'#2a2d3a',accent:'#6366f1',accentHover:'#818cf8'}}}}</script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    input, select { background: #0f1117 !important; }
  </style>
</head>
<body class="bg-bg text-gray-200 min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-lg bg-accent flex items-center justify-center text-white font-bold text-lg">M</div>
      <div>
        <h1 class="text-xl font-semibold text-white">ModelGate</h1>
        <p class="text-sm text-gray-500">LLM Proxy Admin</p>
      </div>
      <div id="status-dot" class="ml-auto w-3 h-3 rounded-full bg-green-500" title="Connected"></div>
    </div>

    <!-- Backends -->
    <section class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-medium text-white">Backends</h2>
        <button onclick="showAddBackend()" class="px-3 py-1.5 text-sm bg-accent hover:bg-accentHover rounded-lg transition">+ Add Backend</button>
      </div>
      <div id="backends-list" class="space-y-3"></div>
    </section>

    <!-- Routing Rules -->
    <section class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-medium text-white">Routing Rules</h2>
        <button onclick="addRule()" class="px-3 py-1.5 text-sm bg-accent hover:bg-accentHover rounded-lg transition">+ Add Rule</button>
      </div>
      <div class="bg-card rounded-xl border border-border overflow-hidden">
        <div class="grid grid-cols-12 gap-2 px-4 py-2 text-xs text-gray-500 uppercase tracking-wider border-b border-border">
          <div class="col-span-1">#</div>
          <div class="col-span-3">Pattern</div>
          <div class="col-span-3">Backend</div>
          <div class="col-span-3">Model Override</div>
          <div class="col-span-2">Actions</div>
        </div>
        <div id="rules-list"></div>
      </div>
      <div class="mt-3 flex justify-end">
        <button onclick="saveRules()" class="px-4 py-2 text-sm bg-accent hover:bg-accentHover rounded-lg transition font-medium">Save Rules</button>
      </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 px-4 py-2 rounded-lg text-sm font-medium opacity-0 transition-opacity duration-300 pointer-events-none"></div>
  </div>

  <!-- Add/Edit Backend Modal -->
  <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50" onclick="if(event.target===this)closeModal()">
    <div class="bg-card rounded-xl border border-border p-6 w-full max-w-md fade-in">
      <h3 id="modal-title" class="text-lg font-medium text-white mb-4">Add Backend</h3>
      <form id="backend-form" onsubmit="saveBackend(event)" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Name</label>
          <input id="be-name" type="text" required class="w-full px-3 py-2 rounded-lg border border-border text-white text-sm focus:outline-none focus:border-accent" placeholder="openrouter">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">URL</label>
          <input id="be-url" type="text" required class="w-full px-3 py-2 rounded-lg border border-border text-white text-sm focus:outline-none focus:border-accent" placeholder="https://openrouter.ai/api">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">API Key</label>
          <input id="be-key" type="text" class="w-full px-3 py-2 rounded-lg border border-border text-white text-sm focus:outline-none focus:border-accent" placeholder="sk-or-...">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">API Mode</label>
            <select id="be-mode" class="w-full px-3 py-2 rounded-lg border border-border text-white text-sm focus:outline-none focus:border-accent">
              <option value="">openai (default)</option>
              <option value="anthropic">anthropic</option>
            </select>
          </div>
          <div class="flex items-end pb-1">
            <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
              <input id="be-optimize" type="checkbox" class="rounded accent-accent">
              Optimize (local models)
            </label>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 px-4 py-2 bg-accent hover:bg-accentHover rounded-lg text-sm font-medium transition">Save</button>
          <button type="button" onclick="closeModal()" class="px-4 py-2 bg-border hover:bg-gray-600 rounded-lg text-sm transition">Cancel</button>
        </div>
      </form>
    </div>
  </div>

<script>
const API = '/admin/api';
let backends = {};
let rules = [];
let backendNames = [];

async function load() {
  try {
    const [bRes, rRes] = await Promise.all([
      fetch(`${API}/backends`).then(r => r.json()),
      fetch(`${API}/routing`).then(r => r.json()),
    ]);
    backends = bRes;
    rules = rRes;
    backendNames = Object.keys(backends);
    renderBackends();
    renderRules();
  } catch (e) {
    toast('Failed to load config', 'error');
  }
}

function renderBackends() {
  const el = document.getElementById('backends-list');
  el.innerHTML = Object.entries(backends).map(([name, b]) => `
    <div class="bg-card rounded-xl border border-border p-4 fade-in">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg ${backendColor(name)} flex items-center justify-center text-white text-xs font-bold">${name[0].toUpperCase()}</div>
          <div>
            <div class="font-medium text-white">${name}</div>
            <div class="text-xs text-gray-500">${b.url}</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${b.apiMode ? `<span class="px-2 py-0.5 text-xs rounded bg-purple-900/50 text-purple-300">${b.apiMode}</span>` : ''}
          ${b.optimize ? '<span class="px-2 py-0.5 text-xs rounded bg-yellow-900/50 text-yellow-300">optimized</span>' : ''}
          ${b.apiKey ? '<span class="px-2 py-0.5 text-xs rounded bg-green-900/50 text-green-300">key set</span>' : '<span class="px-2 py-0.5 text-xs rounded bg-gray-800 text-gray-500">no key</span>'}
          <button onclick="editBackend('${name}')" class="ml-2 p-1.5 rounded hover:bg-border transition" title="Edit">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          ${name !== 'anthropic' ? `<button onclick="removeBackend('${name}')" class="p-1.5 rounded hover:bg-red-900/30 text-red-400 transition" title="Delete">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function backendColor(name) {
  const colors = { anthropic: 'bg-orange-600', lmstudio: 'bg-blue-600', openrouter: 'bg-emerald-600' };
  return colors[name] || 'bg-gray-600';
}

function renderRules() {
  const el = document.getElementById('rules-list');
  el.innerHTML = rules.map((r, i) => `
    <div class="grid grid-cols-12 gap-2 px-4 py-2 border-b border-border/50 items-center text-sm hover:bg-border/20 transition" data-idx="${i}">
      <div class="col-span-1 text-gray-500">${i + 1}</div>
      <div class="col-span-3">
        <input value="${r.match}" onchange="rules[${i}].match=this.value" class="w-full px-2 py-1 rounded border border-border text-white text-sm focus:outline-none focus:border-accent">
      </div>
      <div class="col-span-3">
        <select onchange="rules[${i}].backend=this.value" class="w-full px-2 py-1 rounded border border-border text-white text-sm focus:outline-none focus:border-accent">
          ${backendNames.map(n => `<option value="${n}" ${n===r.backend?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>
      <div class="col-span-3">
        <input value="${r.model||''}" onchange="rules[${i}].model=this.value||undefined" class="w-full px-2 py-1 rounded border border-border text-white text-sm focus:outline-none focus:border-accent" placeholder="(none)">
      </div>
      <div class="col-span-2 flex gap-1">
        <button onclick="moveRule(${i},-1)" class="p-1 rounded hover:bg-border transition ${i===0?'opacity-30':''}" ${i===0?'disabled':''} title="Move up">&#9650;</button>
        <button onclick="moveRule(${i},1)" class="p-1 rounded hover:bg-border transition ${i===rules.length-1?'opacity-30':''}" ${i===rules.length-1?'disabled':''} title="Move down">&#9660;</button>
        <button onclick="removeRule(${i})" class="p-1 rounded hover:bg-red-900/30 text-red-400 transition" title="Remove">&times;</button>
      </div>
    </div>
  `).join('');
}

function addRule() {
  rules.push({ match: '*', backend: backendNames[0] || 'anthropic' });
  renderRules();
}

function removeRule(i) {
  rules.splice(i, 1);
  renderRules();
}

function moveRule(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= rules.length) return;
  [rules[i], rules[j]] = [rules[j], rules[i]];
  renderRules();
}

async function saveRules() {
  const cleaned = rules.map(r => {
    const rule = { match: r.match, backend: r.backend };
    if (r.model) rule.model = r.model;
    return rule;
  });
  const res = await fetch(`${API}/routing`, {
    method: 'PUT',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(cleaned),
  });
  if (res.ok) {
    toast('Routing rules saved');
  } else {
    toast('Failed to save rules', 'error');
  }
}

// ── Backend modal ──

let editingBackend = null;

function showAddBackend() {
  editingBackend = null;
  document.getElementById('modal-title').textContent = 'Add Backend';
  document.getElementById('be-name').value = '';
  document.getElementById('be-name').disabled = false;
  document.getElementById('be-url').value = '';
  document.getElementById('be-key').value = '';
  document.getElementById('be-mode').value = '';
  document.getElementById('be-optimize').checked = false;
  openModal();
}

function editBackend(name) {
  editingBackend = name;
  const b = backends[name];
  document.getElementById('modal-title').textContent = `Edit: ${name}`;
  document.getElementById('be-name').value = name;
  document.getElementById('be-name').disabled = true;
  document.getElementById('be-url').value = b.url;
  document.getElementById('be-key').value = b.apiKey || '';
  document.getElementById('be-mode').value = b.apiMode || '';
  document.getElementById('be-optimize').checked = !!b.optimize;
  openModal();
}

async function saveBackend(e) {
  e.preventDefault();
  const name = editingBackend || document.getElementById('be-name').value.trim();
  if (!name) return;

  const body = {
    url: document.getElementById('be-url').value.trim(),
    apiKey: document.getElementById('be-key').value.trim() || undefined,
    apiMode: document.getElementById('be-mode').value || undefined,
    optimize: document.getElementById('be-optimize').checked || undefined,
  };

  const res = await fetch(`${API}/backends/${name}`, {
    method: 'PUT',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (res.ok) {
    closeModal();
    toast(`Backend "${name}" saved`);
    load();
  } else {
    const err = await res.json();
    toast(err.error || 'Failed to save', 'error');
  }
}

async function removeBackend(name) {
  if (!confirm(`Delete backend "${name}"? This also removes its routing rules.`)) return;
  const res = await fetch(`${API}/backends/${name}`, { method: 'DELETE' });
  if (res.ok) {
    toast(`Backend "${name}" deleted`);
    load();
  }
}

// ── Modal helpers ──

function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('flex'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }

// ── Toast ──

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `fixed bottom-6 right-6 px-4 py-2 rounded-lg text-sm font-medium transition-opacity duration-300 ${type === 'error' ? 'bg-red-900/90 text-red-200' : 'bg-green-900/90 text-green-200'}`;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// ── Init ──
load();
</script>
</body>
</html>
